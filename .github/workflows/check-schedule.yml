name: Check institutional schedule

on:
  workflow_dispatch:

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check schedule source
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Workflow de ejemplo deshabilitado para ejecución automática."
          echo "Implementar descarga, checksum e importación en etapa posterior."
          echo "No usar service_role en el frontend."
